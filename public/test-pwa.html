<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test PWA Button</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #1a0033;
            color: white;
        }
        .header-test {
            background: #d4af37;
            padding: 10px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 20px;
        }
        .app-install-btn {
            background: linear-gradient(135deg, #00cc6a 0%, #00ff88 100%);
            color: #000;
            font-size: 12px;
            font-weight: bold;
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }
        .log {
            background: #000;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-entry {
            margin: 5px 0;
            padding: 3px;
        }
        .log-info { color: #00ff88; }
        .log-error { color: #ff4444; }
        .log-warn { color: #ffaa00; }
    </style>
</head>
<body>
    <h1>🧪 Test del Botón PWA</h1>
    <p>Este es un test simple para verificar que el botón de instalación funciona.</p>
    
    <div class="header-test">
        <button class="app-install-btn" id="testAppBtn">
            ⬇️ INSTALAR APP
        </button>
    </div>
    
    <div id="logContainer" class="log"></div>
    
    <script>
        const logContainer = document.getElementById('logContainer');
        
        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContainer.appendChild(entry);
            console.log(message);
        }
        
        // Info del dispositivo
        const isAndroid = /Android/.test(navigator.userAgent);
        const isChrome = /Chrome/.test(navigator.userAgent);
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
        
        log(`📱 Android: ${isAndroid}`, 'info');
        log(`🌐 Chrome: ${isChrome}`, 'info');
        log(`📲 Standalone: ${isStandalone}`, 'info');
        log(`👤 UserAgent: ${navigator.userAgent.substring(0, 50)}...`, 'info');
        
        // Verificar botón
        const btn = document.getElementById('testAppBtn');
        if (btn) {
            log('✅ Botón encontrado en el DOM', 'info');
            log(`📐 Tamaño: ${btn.offsetWidth}x${btn.offsetHeight}px`, 'info');
            log(`👁️ Visible: ${btn.offsetWidth > 0 && btn.offsetHeight > 0}`, 'info');
            
            btn.addEventListener('click', () => {
                log('👆 Botón clickeado!', 'warn');
                alert('¡El botón funciona! Ahora prueba en la app real.');
            });
        } else {
            log('❌ Botón NO encontrado', 'error');
        }
        
        // Verificar beforeinstallprompt
        window.addEventListener('beforeinstallprompt', (e) => {
            log('🎯 Evento beforeinstallprompt detectado!', 'warn');
            e.preventDefault();
        });
        
        // Verificar service worker
        if ('serviceWorker' in navigator) {
            log('✅ Service Worker soportado', 'info');
        } else {
            log('❌ Service Worker NO soportado', 'error');
        }
        
        // Verificar notificaciones
        if ('Notification' in window) {
            log(`🔔 Notificaciones: ${Notification.permission}`, 'info');
        }
    </script>
</body>
</html>
